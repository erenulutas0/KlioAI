name: Flutter Quality

on:
  push:
    branches:
      - main
    paths:
      - "flutter_vocabmaster/**"
      - "scripts/flutter-quality-gate.ps1"
      - ".github/workflows/flutter-quality.yml"
  # No paths filter on pull_request: this is a branch-protection REQUIRED
  # check, so it must always run and report on every PR. With a paths filter
  # it silently skips on PRs that don't touch Flutter files, leaving the
  # required check stuck "Expected — waiting for status" forever and blocking
  # merge. The gate is fast and passes cleanly when Flutter code is unchanged.
  pull_request:
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        working-directory: flutter_vocabmaster
        run: flutter doctor -v

      - name: Run Flutter Quality Gate
        shell: pwsh
        run: pwsh -File ./scripts/flutter-quality-gate.ps1
