name: Android AAB Artifact

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend URL baked into the release build"
        required: true
        default: "https://api.klioai.app"
      run_quality_gate:
        description: "Run Flutter quality gate before building"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  android-aab-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        working-directory: flutter_vocabmaster
        run: flutter pub get

      - name: Accept Android SDK Licenses And Install NDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14033849"

      - name: Flutter Quality Gate
        if: ${{ inputs.run_quality_gate == 'true' }}
        shell: pwsh
        run: pwsh -File ./scripts/flutter-quality-gate.ps1 -SkipPubGet

      - name: Prepare Android Release Signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          for var_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::$var_name GitHub secret is missing."
              exit 1
            fi
          done

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > flutter_vocabmaster/android/app/upload-keystore.jks

          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > flutter_vocabmaster/android/key.properties

          chmod 600 flutter_vocabmaster/android/key.properties flutter_vocabmaster/android/app/upload-keystore.jks

      - name: Build Release AAB
        working-directory: flutter_vocabmaster
        run: flutter build appbundle --release --dart-define=BACKEND_URL="${{ inputs.backend_url }}"

      - name: Generate Release Checklist
        shell: pwsh
        run: >
          pwsh -File ./scripts/new-release-checklist.ps1
          -OutputPath build/release-checklist.md
          -BackendUrl "${{ inputs.backend_url }}"
          -PreparedBy "GitHub Actions"
          -AndroidArtifact "app-release.aab"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: klioai-release-aab
          path: flutter_vocabmaster/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release Checklist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: klioai-release-checklist
          path: build/release-checklist.md
          if-no-files-found: error
          retention-days: 30
