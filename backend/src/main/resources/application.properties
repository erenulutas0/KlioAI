# Server Configuration
server.port=8082

# Database Configuration (PostgreSQL - EnglishApp)
spring.datasource.url=jdbc:postgresql://localhost:5432/EnglishApp
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET statement_timeout TO 5000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.jakarta.persistence.query.timeout=5000
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.mvc.converters.preferred-json-mapper=jackson


# Logging
logging.level.com.ingilizce.calismaapp=DEBUG
logging.level.org.springframework.web=DEBUG

# Feature Flags
app.features.community.enabled=false
app.socketio.enabled=false

# CORS
app.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Groq AI Configuration
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
app.ai.model-routing.enabled=${APP_AI_MODEL_ROUTING_ENABLED:true}
app.ai.model-routing.default-model=${APP_AI_MODEL_ROUTING_DEFAULT_MODEL:openai/gpt-oss-20b}
app.ai.model-routing.speech-model=${APP_AI_MODEL_ROUTING_SPEECH_MODEL:llama-3.3-70b-versatile}
app.ai.model-routing.utility-model=${APP_AI_MODEL_ROUTING_UTILITY_MODEL:openai/gpt-oss-20b}
app.ai.model-routing.speech-scopes=${APP_AI_MODEL_ROUTING_SPEECH_SCOPES:speaking-generate,speaking-evaluate}
# Iyzico Configuration (non-prod defaults are env-driven; prod overrides enforce required values)
iyzico.api.key=${IYZICO_API_KEY:}
iyzico.api.secret=${IYZICO_API_SECRET:}
iyzico.api.base.url=${IYZICO_API_BASE_URL:https://sandbox-api.iyzipay.com}
# Groq Resilience
groq.resilience.max-attempts=3
groq.resilience.initial-backoff-ms=250
groq.resilience.max-backoff-ms=2000
groq.resilience.call-timeout-budget-ms=35000
groq.resilience.failure-threshold=5
groq.resilience.open-duration-ms=30000
app.security.allow-insecure-ssl=${APP_SECURITY_ALLOW_INSECURE_SSL:false}
app.security.trust-forwarded-ip-header=${APP_SECURITY_TRUST_FORWARDED_IP_HEADER:false}
app.security.forwarded-ip-header-name=${APP_SECURITY_FORWARDED_IP_HEADER_NAME:X-Forwarded-For}
app.security.jwt.enforce-auth=${APP_SECURITY_JWT_ENFORCE_AUTH:false}
app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:calismaapp}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.access-token-ttl-seconds=${APP_SECURITY_JWT_ACCESS_TOKEN_TTL_SECONDS:900}
app.security.jwt.refresh-token-ttl-seconds=${APP_SECURITY_JWT_REFRESH_TOKEN_TTL_SECONDS:604800}
app.security.jwt.refresh-token-remember-me-ttl-seconds=${APP_SECURITY_JWT_REFRESH_TOKEN_REMEMBER_ME_TTL_SECONDS:2592000}
app.security.jwt.allowed-clock-skew-seconds=${APP_SECURITY_JWT_ALLOWED_CLOCK_SKEW_SECONDS:30}
app.security.auth-rate-limit.enabled=${APP_SECURITY_AUTH_RATE_LIMIT_ENABLED:true}
app.security.auth-rate-limit.redis-enabled=${APP_SECURITY_AUTH_RATE_LIMIT_REDIS_ENABLED:true}
app.security.auth-rate-limit.redis-fallback-mode=${APP_SECURITY_AUTH_RATE_LIMIT_REDIS_FALLBACK_MODE:memory}
app.security.auth-rate-limit.redis-failure-block-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_REDIS_FAILURE_BLOCK_SECONDS:60}
app.security.auth-rate-limit.login-principal-max-attempts=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_PRINCIPAL_MAX_ATTEMPTS:8}
app.security.auth-rate-limit.login-principal-window-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_PRINCIPAL_WINDOW_SECONDS:300}
app.security.auth-rate-limit.login-principal-block-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_PRINCIPAL_BLOCK_SECONDS:900}
app.security.auth-rate-limit.login-ip-max-attempts=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_IP_MAX_ATTEMPTS:40}
app.security.auth-rate-limit.login-ip-window-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_IP_WINDOW_SECONDS:300}
app.security.auth-rate-limit.login-ip-block-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_LOGIN_IP_BLOCK_SECONDS:900}
app.security.auth-rate-limit.register-ip-max-attempts=${APP_SECURITY_AUTH_RATE_LIMIT_REGISTER_IP_MAX_ATTEMPTS:10}
app.security.auth-rate-limit.register-ip-window-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_REGISTER_IP_WINDOW_SECONDS:600}
app.security.auth-rate-limit.register-ip-block-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_REGISTER_IP_BLOCK_SECONDS:1800}
app.security.auth-rate-limit.password-reset-ip-max-attempts=${APP_SECURITY_AUTH_RATE_LIMIT_PASSWORD_RESET_IP_MAX_ATTEMPTS:6}
app.security.auth-rate-limit.password-reset-ip-window-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_PASSWORD_RESET_IP_WINDOW_SECONDS:600}
app.security.auth-rate-limit.password-reset-ip-block-seconds=${APP_SECURITY_AUTH_RATE_LIMIT_PASSWORD_RESET_IP_BLOCK_SECONDS:1800}
app.security.ai-rate-limit.enabled=${APP_SECURITY_AI_RATE_LIMIT_ENABLED:true}
app.security.ai-rate-limit.redis-enabled=${APP_SECURITY_AI_RATE_LIMIT_REDIS_ENABLED:true}
app.security.ai-rate-limit.redis-fallback-mode=${APP_SECURITY_AI_RATE_LIMIT_REDIS_FALLBACK_MODE:memory}
app.security.ai-rate-limit.redis-failure-block-seconds=${APP_SECURITY_AI_RATE_LIMIT_REDIS_FAILURE_BLOCK_SECONDS:60}
app.security.ai-rate-limit.user-window-max-requests=${APP_SECURITY_AI_RATE_LIMIT_USER_WINDOW_MAX_REQUESTS:30}
app.security.ai-rate-limit.ip-window-max-requests=${APP_SECURITY_AI_RATE_LIMIT_IP_WINDOW_MAX_REQUESTS:80}
app.security.ai-rate-limit.window-seconds=${APP_SECURITY_AI_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.ai-rate-limit.daily-quota-per-user=${APP_SECURITY_AI_RATE_LIMIT_DAILY_QUOTA_PER_USER:200}
app.security.ai-rate-limit.abuse-penalty-enabled=${APP_SECURITY_AI_RATE_LIMIT_ABUSE_PENALTY_ENABLED:true}
app.security.ai-rate-limit.abuse-penalty-seconds=${APP_SECURITY_AI_RATE_LIMIT_ABUSE_PENALTY_SECONDS:30,60,150}
app.security.ai-rate-limit.abuse-strike-reset-seconds=${APP_SECURITY_AI_RATE_LIMIT_ABUSE_STRIKE_RESET_SECONDS:900}
app.security.ai-rate-limit.memory-max-entries-per-map=${APP_SECURITY_AI_RATE_LIMIT_MEMORY_MAX_ENTRIES_PER_MAP:100000}
app.security.ai-rate-limit.memory-cleanup-interval-seconds=${APP_SECURITY_AI_RATE_LIMIT_MEMORY_CLEANUP_INTERVAL_SECONDS:30}

# AI Token Quota (daily tokens per user; enforced server-side for Groq-backed features)
app.security.ai-token-quota.enabled=${APP_SECURITY_AI_TOKEN_QUOTA_ENABLED:false}
app.security.ai-token-quota.redis-enabled=${APP_SECURITY_AI_TOKEN_QUOTA_REDIS_ENABLED:true}
app.security.ai-token-quota.redis-fallback-mode=${APP_SECURITY_AI_TOKEN_QUOTA_REDIS_FALLBACK_MODE:memory}
app.security.ai-token-quota.redis-failure-block-seconds=${APP_SECURITY_AI_TOKEN_QUOTA_REDIS_FAILURE_BLOCK_SECONDS:60}
app.security.ai-token-quota.daily-token-quota-per-user=${APP_SECURITY_AI_TOKEN_QUOTA_DAILY_TOKEN_QUOTA_PER_USER:30000}
app.security.ai-token-quota.memory-max-entries=${APP_SECURITY_AI_TOKEN_QUOTA_MEMORY_MAX_ENTRIES:100000}
app.security.ai-token-quota.memory-cleanup-interval-seconds=${APP_SECURITY_AI_TOKEN_QUOTA_MEMORY_CLEANUP_INTERVAL_SECONDS:30}
app.security.ai-token-quota.trial-duration-days=${APP_SECURITY_AI_TOKEN_QUOTA_TRIAL_DURATION_DAYS:7}
app.security.ai-token-quota.trial-daily-token-quota-per-user=${APP_SECURITY_AI_TOKEN_QUOTA_TRIAL_DAILY_TOKEN_QUOTA_PER_USER:5000}
app.security.ai-token-quota.free-daily-token-quota-per-user=${APP_SECURITY_AI_TOKEN_QUOTA_FREE_DAILY_TOKEN_QUOTA_PER_USER:1500}
app.security.ai-token-quota.premium-daily-token-quota-per-user=${APP_SECURITY_AI_TOKEN_QUOTA_PREMIUM_DAILY_TOKEN_QUOTA_PER_USER:30000}
app.security.ai-token-quota.premium-plus-daily-token-quota-per-user=${APP_SECURITY_AI_TOKEN_QUOTA_PREMIUM_PLUS_DAILY_TOKEN_QUOTA_PER_USER:60000}
app.security.ai-token-quota.estimated-cost-usd-per-million-tokens=${APP_SECURITY_AI_TOKEN_QUOTA_ESTIMATED_COST_USD_PER_MILLION_TOKENS:0.10}
# Optional per-scope example:
# app.security.ai-token-quota.scopes.chat.daily-token-quota-per-user=30000
app.security.auth.password-reset-token-ttl-seconds=${APP_SECURITY_AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:900}
app.security.auth.email-verification-token-ttl-seconds=${APP_SECURITY_AUTH_EMAIL_VERIFICATION_TOKEN_TTL_SECONDS:86400}
app.security.auth.expose-debug-tokens=${APP_SECURITY_AUTH_EXPOSE_DEBUG_TOKENS:false}
app.security.auth.email-password-enabled=${APP_SECURITY_AUTH_EMAIL_PASSWORD_ENABLED:true}
app.security.auth.google-id-token-required=${APP_SECURITY_AUTH_GOOGLE_ID_TOKEN_REQUIRED:false}
app.security.auth.google-client-ids=${APP_SECURITY_AUTH_GOOGLE_CLIENT_IDS:}
app.security.trial-abuse.enabled=${APP_SECURITY_TRIAL_ABUSE_ENABLED:true}
app.security.trial-abuse.redis-enabled=${APP_SECURITY_TRIAL_ABUSE_REDIS_ENABLED:true}
app.security.trial-abuse.redis-fallback-mode=${APP_SECURITY_TRIAL_ABUSE_REDIS_FALLBACK_MODE:memory}
app.security.trial-abuse.redis-failure-block-seconds=${APP_SECURITY_TRIAL_ABUSE_REDIS_FAILURE_BLOCK_SECONDS:60}
app.security.trial-abuse.window-hours=${APP_SECURITY_TRIAL_ABUSE_WINDOW_HOURS:24}
app.security.trial-abuse.max-trial-accounts-per-device=${APP_SECURITY_TRIAL_ABUSE_MAX_TRIAL_ACCOUNTS_PER_DEVICE:2}
app.security.trial-abuse.max-trial-accounts-per-ip=${APP_SECURITY_TRIAL_ABUSE_MAX_TRIAL_ACCOUNTS_PER_IP:3}
app.subscription.mock-verification-enabled=${APP_SUBSCRIPTION_MOCK_VERIFICATION_ENABLED:true}
app.subscription.google-play.enabled=${APP_SUBSCRIPTION_GOOGLE_PLAY_ENABLED:false}
app.subscription.google-play.package-name=${APP_SUBSCRIPTION_GOOGLE_PLAY_PACKAGE_NAME:}
app.subscription.google-play.service-account-file=${APP_SUBSCRIPTION_GOOGLE_PLAY_SERVICE_ACCOUNT_FILE:}
app.subscription.google-play.token-uri=${APP_SUBSCRIPTION_GOOGLE_PLAY_TOKEN_URI:https://oauth2.googleapis.com/token}
app.subscription.google-play.publisher-api-base-url=${APP_SUBSCRIPTION_GOOGLE_PLAY_API_BASE_URL:https://androidpublisher.googleapis.com}
app.subscription.google-play.accept-grace-period=${APP_SUBSCRIPTION_GOOGLE_PLAY_ACCEPT_GRACE_PERIOD:true}
app.subscription.google-play.accept-on-hold=${APP_SUBSCRIPTION_GOOGLE_PLAY_ACCEPT_ON_HOLD:false}
app.subscription.google-play.access-token-skew-seconds=${APP_SUBSCRIPTION_GOOGLE_PLAY_ACCESS_TOKEN_SKEW_SECONDS:60}
app.subscription.google-play.reconciliation.enabled=${APP_SUBSCRIPTION_GOOGLE_PLAY_RECONCILIATION_ENABLED:false}
app.subscription.google-play.reconciliation.cron=${APP_SUBSCRIPTION_GOOGLE_PLAY_RECONCILIATION_CRON:0 */30 * * * *}
app.subscription.google-play.reconciliation.max-users-per-run=${APP_SUBSCRIPTION_GOOGLE_PLAY_RECONCILIATION_MAX_USERS_PER_RUN:200}
app.subscription.google-play.product-plan-map.pro_monthly_subscription=${APP_SUBSCRIPTION_GOOGLE_PLAY_PRODUCT_PLAN_PRO_MONTHLY:PREMIUM}
app.subscription.google-play.product-plan-map.pro_annual_subscription=${APP_SUBSCRIPTION_GOOGLE_PLAY_PRODUCT_PLAN_PRO_ANNUAL:PREMIUM_PLUS}
app.subscription.google-play.product-plan-map.premium_monthly=${APP_SUBSCRIPTION_GOOGLE_PLAY_PRODUCT_PLAN_PREMIUM_MONTHLY:PREMIUM}
app.subscription.google-play.product-plan-map.premium_plus_monthly=${APP_SUBSCRIPTION_GOOGLE_PLAY_PRODUCT_PLAN_PREMIUM_PLUS_MONTHLY:PREMIUM_PLUS}
app.subscription.google-play.product-plan-map.monthly=${APP_SUBSCRIPTION_GOOGLE_PLAY_PRODUCT_PLAN_MONTHLY:PREMIUM}

# Push Notifications (Firebase Cloud Messaging)
app.push.firebase.enabled=${APP_PUSH_FIREBASE_ENABLED:false}
app.push.firebase.service-account-file=${APP_PUSH_FIREBASE_SERVICE_ACCOUNT_FILE:}
app.push.firebase.service-account-json=${APP_PUSH_FIREBASE_SERVICE_ACCOUNT_JSON:}
app.push.daily-reminders.enabled=${APP_PUSH_DAILY_REMINDERS_ENABLED:false}
app.push.daily-reminders.cron=${APP_PUSH_DAILY_REMINDERS_CRON:0 0 17 * * *}
app.push.daily-reminders.zone=${APP_PUSH_DAILY_REMINDERS_ZONE:UTC}
app.push.daily-reminders.title=${APP_PUSH_DAILY_REMINDERS_TITLE:KlioAI}
app.push.daily-reminders.body=${APP_PUSH_DAILY_REMINDERS_BODY:A quick practice session is ready for today.}
app.push.daily-reminders.max-tokens-per-run=${APP_PUSH_DAILY_REMINDERS_MAX_TOKENS_PER_RUN:500}

