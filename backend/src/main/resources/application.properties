# Piper TTS Configuration
# Leave empty to auto-detect, or specify full path like: C:\path\to\piper.exe
piper.tts.path=C:/piper/piper.exe
piper.tts.default-model=${PIPER_TTS_DEFAULT_MODEL:en_US-amy-medium.onnx}

# Redis Cache Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.repositories.enabled=false
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.security.host=${SPRING_DATA_REDIS_SECURITY_HOST:${spring.data.redis.host}}
spring.data.redis.security.port=${SPRING_DATA_REDIS_SECURITY_PORT:${spring.data.redis.port}}
spring.data.redis.security.password=${SPRING_DATA_REDIS_SECURITY_PASSWORD:${spring.data.redis.password}}
spring.data.redis.security.database=${SPRING_DATA_REDIS_SECURITY_DATABASE:0}
spring.data.redis.security.timeout=${SPRING_DATA_REDIS_SECURITY_TIMEOUT:${spring.data.redis.timeout}}

# Cache Configuration
# Cache TTL: 7 days (same word won't be asked again for 7 days)
cache.sentences.ttl=604800
# Dictionary cache TTL: 1 day (shared global cache for dictionary responses)
cache.dictionary.ttl=86400
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Actuator / Health Probes
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true

