# Production hardening: require secrets and reduce management/API surface.

# Secrets/Credentials (no fallback defaults)
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.security.password=${SPRING_DATA_REDIS_SECURITY_PASSWORD}
groq.api.key=${GROQ_API_KEY}
iyzico.api.key=${IYZICO_API_KEY}
iyzico.api.secret=${IYZICO_API_SECRET}
iyzico.api.base.url=${IYZICO_API_BASE_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.cors.strict-origin-validation=true

# Swagger/OpenAPI disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Expose only liveness/readiness health endpoint in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=false

# Security headers (enabled in production)
app.security.headers.enabled=true
app.security.headers.hsts-enabled=true
app.security.headers.hsts-max-age-seconds=31536000
app.security.headers.hsts-include-sub-domains=true
app.security.headers.hsts-preload=false
app.security.jwt.enforce-auth=true
app.security.jwt.issuer=calismaapp
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.access-token-ttl-seconds=900
app.security.jwt.refresh-token-ttl-seconds=604800
app.security.jwt.refresh-token-remember-me-ttl-seconds=2592000
app.security.jwt.allowed-clock-skew-seconds=30
app.security.auth-rate-limit.enabled=true
app.security.auth-rate-limit.redis-enabled=true
app.security.auth-rate-limit.redis-fallback-mode=memory
app.security.auth-rate-limit.redis-failure-block-seconds=60
app.security.auth-rate-limit.login-principal-max-attempts=6
app.security.auth-rate-limit.login-principal-window-seconds=300
app.security.auth-rate-limit.login-principal-block-seconds=900
app.security.auth-rate-limit.login-ip-max-attempts=30
app.security.auth-rate-limit.login-ip-window-seconds=300
app.security.auth-rate-limit.login-ip-block-seconds=900
app.security.auth-rate-limit.register-ip-max-attempts=8
app.security.auth-rate-limit.register-ip-window-seconds=600
app.security.auth-rate-limit.register-ip-block-seconds=1800
app.security.auth-rate-limit.password-reset-ip-max-attempts=4
app.security.auth-rate-limit.password-reset-ip-window-seconds=600
app.security.auth-rate-limit.password-reset-ip-block-seconds=1800
app.security.ai-rate-limit.enabled=true
app.security.ai-rate-limit.redis-enabled=true
app.security.ai-rate-limit.redis-fallback-mode=memory
app.security.ai-rate-limit.redis-failure-block-seconds=60
app.security.ai-rate-limit.user-window-max-requests=20
app.security.ai-rate-limit.ip-window-max-requests=50
app.security.ai-rate-limit.window-seconds=60
app.security.ai-rate-limit.abuse-penalty-enabled=true
app.security.ai-rate-limit.abuse-penalty-seconds=30,60,150
app.security.ai-rate-limit.abuse-strike-reset-seconds=900
app.security.ai-rate-limit.memory-max-entries-per-map=100000
app.security.ai-rate-limit.memory-cleanup-interval-seconds=30
# Token quota is the primary cost guardrail; keep request-based daily quota high enough
# to not be the limiting factor for normal usage.
app.security.ai-rate-limit.daily-quota-per-user=1000

# AI Token Quota (daily tokens per user; prompt + completion tokens)
app.security.ai-token-quota.enabled=true
app.security.ai-token-quota.redis-enabled=true
# Cost-protecting default: if Redis is down, block AI calls rather than allow unlimited spend.
app.security.ai-token-quota.redis-fallback-mode=deny
app.security.ai-token-quota.redis-failure-block-seconds=60
# Global budget across all AI features that proxy through the backend.
app.security.ai-token-quota.daily-token-quota-per-user=50000
app.security.ai-token-quota.memory-max-entries=100000
app.security.ai-token-quota.memory-cleanup-interval-seconds=30
app.security.auth.password-reset-token-ttl-seconds=900
app.security.auth.email-verification-token-ttl-seconds=86400
app.security.auth.expose-debug-tokens=false
app.security.auth.google-id-token-required=true
app.security.auth.google-client-ids=${APP_SECURITY_AUTH_GOOGLE_CLIENT_IDS}
app.security.trust-forwarded-ip-header=${APP_SECURITY_TRUST_FORWARDED_IP_HEADER:false}
app.security.forwarded-ip-header-name=${APP_SECURITY_FORWARDED_IP_HEADER_NAME:X-Forwarded-For}
app.subscription.mock-verification-enabled=false
