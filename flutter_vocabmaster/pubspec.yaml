name: vocabmaster
description: A vocabulary learning app with gamification features
publish_to: 'none'
version: 1.1.3+285

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.65.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^6.0.0
  device_info_plus: ^10.1.2
  flutter_tts: ^3.8.3
  socket_io_client: ^2.0.3+1
  audioplayers: ^5.2.1
  just_audio: ^0.9.36
  in_app_purchase: ^3.2.0
  webview_flutter: ^4.4.2
  flutter_webrtc: ^1.4.1
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.9
  provider: ^6.1.1
  # Offline support
  sqflite: ^2.3.2
  path: ^1.9.0
  connectivity_plus: ^6.0.5
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  speech_to_text: ^7.3.0
  cached_network_image: ^3.4.0
  google_fonts: ^8.1.0
  lucide_icons: ^0.257.0
  google_sign_in: ^6.2.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_messaging: ^16.0.0
  in_app_review: ^2.0.10
  flutter_local_notifications: 17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  sqlite3: ^3.3.1
  sqflite_common_ffi: 2.4.0+3
  mockito: ^5.4.4
  build_runner: ^2.4.13

dependency_overrides:
  # Newer url_launcher_android pulls AndroidX artifacts that require AGP 8.9+.
  # Keep this pinned until the Android Gradle Plugin is upgraded.
  url_launcher_android: 6.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/mainLogo.png
    - assets/images/telephone_logo.png
    - assets/images/telephone_logo_foreground.png

  # To add custom fonts to your application, add a fonts section here
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: fonts/Inter-Regular.ttf
  #       - asset: fonts/Inter-Bold.ttf
  #         weight: 700


flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/telephone_logo.png
  adaptive_icon_foreground: assets/images/telephone_logo_foreground.png
  adaptive_icon_background: '#0B1118'
  remove_alpha_ios: true
