global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/cache-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8082

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis-main
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          redis_instance: main

  - job_name: redis-security
    static_configs:
      - targets:
          - redis-security-exporter:9121
        labels:
          redis_instance: security
