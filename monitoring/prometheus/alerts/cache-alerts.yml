groups:
  - name: chatbot-cache-observability
    rules:
      - record: chatbot_cache_lookup_rps:rate5m
        expr: |
          sum(
            rate({__name__=~"chatbot_sentences_cache_lookup_total(_total)?", outcome=~"hit|miss|error"}[5m])
          )

      - record: chatbot_cache_hit_ratio:ratio5m
        expr: |
          sum(
            rate({__name__=~"chatbot_sentences_cache_lookup_total(_total)?", outcome="hit"}[5m])
          )
          /
          clamp_min(
            sum(
              rate({__name__=~"chatbot_sentences_cache_lookup_total(_total)?", outcome=~"hit|miss|error"}[5m])
            ),
            0.000001
          )

      - record: chatbot_cache_error_rate:ratio5m
        expr: |
          sum(
            rate({__name__=~"chatbot_sentences_cache_lookup_total(_total)?", outcome="error"}[5m])
          )
          /
          clamp_min(
            sum(
              rate({__name__=~"chatbot_sentences_cache_lookup_total(_total)?", outcome=~"hit|miss|error"}[5m])
            ),
            0.000001
          )

      - record: chatbot_cache_lookup_latency_seconds:avg5m
        expr: |
          sum(rate(chatbot_sentences_cache_lookup_latency_seconds_sum{outcome=~"hit|miss|error"}[5m]))
          /
          clamp_min(
            sum(rate(chatbot_sentences_cache_lookup_latency_seconds_count{outcome=~"hit|miss|error"}[5m])),
            0.000001
          )

      - alert: ChatbotCacheHitRatioLow
        expr: chatbot_cache_hit_ratio:ratio5m < 0.70
        for: 15m
        labels:
          severity: warning
          component: chatbot-cache
        annotations:
          summary: "Chatbot cache hit ratio is low"
          description: "Hit ratio is {{ $value | printf \"%.2f\" }} over the last 5m (threshold 0.70)."

      - alert: ChatbotCacheErrorRateHigh
        expr: chatbot_cache_error_rate:ratio5m > 0.05
        for: 10m
        labels:
          severity: critical
          component: chatbot-cache
        annotations:
          summary: "Chatbot cache error rate is high"
          description: "Error rate is {{ $value | printf \"%.2f\" }} over the last 5m (threshold 0.05)."

      - alert: ChatbotCacheLookupLatencyHigh
        expr: chatbot_cache_lookup_latency_seconds:avg5m > 0.80
        for: 10m
        labels:
          severity: warning
          component: chatbot-cache
        annotations:
          summary: "Chatbot cache lookup latency is high"
          description: "Average lookup latency is {{ $value | printf \"%.3f\" }}s over the last 5m (threshold 0.80s)."

  - name: auth-rate-limit-observability
    rules:
      - alert: AuthRateLimitRedisFallbackActive
        expr: max(auth_rate_limit_redis_fallback_active) > 0
        for: 2m
        labels:
          severity: critical
          component: auth-rate-limit
        annotations:
          summary: "Auth rate-limit is running in Redis fallback mode"
          description: "Redis-backed auth throttling is degraded to in-memory fallback for more than 2m."

      - alert: AuthRateLimitRedisFailuresDetected
        expr: sum(increase(auth_rate_limit_redis_failure_total[5m])) >= 3
        for: 0m
        labels:
          severity: warning
          component: auth-rate-limit
        annotations:
          summary: "Auth rate-limit Redis failures detected"
          description: "Auth rate-limit Redis operations failed {{ $value | printf \"%.0f\" }} times in the last 5m."

      - alert: AuthRateLimitFailClosedBlocking
        expr: sum(increase(auth_rate_limit_redis_fail_closed_block_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
          component: auth-rate-limit
        annotations:
          summary: "Auth rate-limit fail-closed mode is actively blocking requests"
          description: "Fail-closed blocks observed {{ $value | printf \"%.0f\" }} times in the last 5m."

  - name: ai-rate-limit-observability
    rules:
      - alert: AiRateLimitRedisFallbackActive
        expr: max(ai_rate_limit_redis_fallback_active) > 0
        for: 2m
        labels:
          severity: critical
          component: ai-rate-limit
        annotations:
          summary: "AI rate-limit is running in Redis fallback mode"
          description: "Redis-backed AI throttling is degraded to in-memory fallback for more than 2m."

      - alert: AiRateLimitRedisFailuresDetected
        expr: sum(increase(ai_rate_limit_redis_failure_total[5m])) >= 3
        for: 0m
        labels:
          severity: warning
          component: ai-rate-limit
        annotations:
          summary: "AI rate-limit Redis failures detected"
          description: "AI rate-limit Redis operations failed {{ $value | printf \"%.0f\" }} times in the last 5m."

      - alert: AiRateLimitBlocksSpike
        expr: sum(increase(ai_rate_limit_block_total[5m])) >= 50
        for: 0m
        labels:
          severity: warning
          component: ai-rate-limit
        annotations:
          summary: "AI rate-limit blocking spike detected"
          description: "AI rate-limit blocks reached {{ $value | printf \"%.0f\" }} in the last 5m."

  - name: scale-readiness-observability
    rules:
      - record: node_filesystem_used_ratio:ratio5m
        expr: |
          1 -
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs", mountpoint!~"/run.*|/var/lib/docker/.+"}
            /
            clamp_min(node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs", mountpoint!~"/run.*|/var/lib/docker/.+"}, 1)
          )

      - alert: VpsDiskUsageHigh
        expr: max(node_filesystem_used_ratio:ratio5m) > 0.80
        for: 10m
        labels:
          severity: warning
          component: vps-disk
        annotations:
          summary: "VPS disk usage is high"
          description: "Disk usage is {{ $value | printf \"%.2f\" }} of capacity. Review Docker image/cache usage and old backups before deploying."

      - alert: VpsDiskUsageCritical
        expr: max(node_filesystem_used_ratio:ratio5m) > 0.90
        for: 5m
        labels:
          severity: critical
          component: vps-disk
        annotations:
          summary: "VPS disk usage is critical"
          description: "Disk usage is {{ $value | printf \"%.2f\" }} of capacity. New deploys or backups may fail."

      - record: backend_jvm_heap_used_ratio:ratio5m
        expr: |
          sum(jvm_memory_used_bytes{area="heap"})
          /
          clamp_min(sum(jvm_memory_max_bytes{area="heap"}), 1)

      - alert: BackendJvmHeapUsageHigh
        expr: backend_jvm_heap_used_ratio:ratio5m > 0.85
        for: 10m
        labels:
          severity: warning
          component: backend-jvm
        annotations:
          summary: "Backend JVM heap usage is high"
          description: "Heap usage is {{ $value | printf \"%.2f\" }} of max heap over the last window."

      - record: backend_hikari_active_ratio:ratio5m
        expr: |
          sum(hikaricp_connections_active)
          /
          clamp_min(sum(hikaricp_connections_max), 1)

      - alert: BackendHikariPoolSaturationHigh
        expr: backend_hikari_active_ratio:ratio5m > 0.85
        for: 5m
        labels:
          severity: warning
          component: backend-db-pool
        annotations:
          summary: "Backend database connection pool is near saturation"
          description: "Hikari active/max ratio is {{ $value | printf \"%.2f\" }}."

      - alert: BackendHikariThreadsAwaitingConnection
        expr: sum(hikaricp_connections_pending) > 0
        for: 2m
        labels:
          severity: critical
          component: backend-db-pool
        annotations:
          summary: "Backend requests are waiting for database connections"
          description: "Hikari pending connection count is {{ $value | printf \"%.0f\" }}."

      - record: redis_memory_used_ratio:ratio5m
        expr: |
          redis_memory_used_bytes
          /
          clamp_min(redis_memory_max_bytes, 1)

      - alert: RedisMemoryUsageHigh
        expr: max by (redis_instance) (redis_memory_used_ratio:ratio5m) > 0.80
        for: 10m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis {{ $labels.redis_instance }} memory usage is {{ $value | printf \"%.2f\" }} of configured maxmemory."

      - alert: RedisRejectedConnectionsDetected
        expr: increase(redis_rejected_connections_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis rejected client connections"
          description: "Redis rejected {{ $value | printf \"%.0f\" }} connections in the last 5m."
